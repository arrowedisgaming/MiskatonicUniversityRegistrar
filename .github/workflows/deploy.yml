name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build, migrate D1, deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://miskatonic-university-registrar.pages.dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check

      - name: Unit tests
        run: npm test -- --run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        # AUTH_SECRET is required by src/lib/server/auth.ts in any non-development
        # build. The e2e suite never exercises real sign-in, so any non-empty
        # value satisfies the boot guard inside the preview server.
        env:
          AUTH_SECRET: e2e-placeholder-no-real-sessions-issued
        run: npm run test:e2e

      - name: Build with Cloudflare adapter
        run: npm run build
        env:
          ADAPTER: cloudflare

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply miskatonic-db --remote

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=miskatonic-university-registrar --branch=main
