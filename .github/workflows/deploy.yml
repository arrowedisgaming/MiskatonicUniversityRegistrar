name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build, migrate D1, deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://miskatonic-university-registrar.pages.dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check

      - name: Unit tests
        run: npm test -- --run

      - name: Build with Cloudflare adapter
        run: npm run build
        env:
          ADAPTER: cloudflare

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply miskatonic-db --remote --yes

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=miskatonic-university-registrar --branch=main
